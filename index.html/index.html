<!DOCTYPE html>
<html>
<body>

<h3>Login</h3>
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>

<h3>Nova tarefa</h3>
<input id="task" placeholder="tarefa">
<button onclick="add()">Adicionar</button>

<h3>Lista</h3>
<ul id="list"></ul>

<script>
let token = localStorage.getItem("token") || "";

// login
function login() {
    fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(r => {
        if (!r.ok) throw new Error("Login inválido");
        return r.json();
    })
    .then(data => {
        token = data.access_token;

        // 🔥 SALVA AQUI
        localStorage.setItem("token", token);

        alert("Login realizado!");
        getTasks();
    })
    .catch(err => alert(err.message));
}

// criar tarefa
function add() {
    if (!token) {
        alert("Faça login primeiro!");
        return;
    }

    const title = document.getElementById("task").value;

    if (!title) {
        alert("Digite uma tarefa!");
        return;
    }

    fetch("http://127.0.0.1:5000/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title })
    })
    .then(r => {
        if (!r.ok) {
            throw new Error("Erro ao criar tarefa");
        }
        return r.json();
    })
    .then(() => {
        document.getElementById("task").value = "";
        getTasks();
    })
    .catch(err => alert(err.message));
}

// listar tarefas
function getTasks() {
    fetch("http://127.0.0.1:5000/tasks", {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(r => {
        if (!r.ok) {
            throw new Error("Erro ao carregar tarefas");
        }
        return r.json();
    })
    .then(data => {
        if (!Array.isArray(data)) {
            throw new Error("Resposta inválida da API");
        }

        let ul = document.getElementById("list");
        ul.innerHTML = "";

        data.forEach(t => {
            let li = document.createElement("li");

            let span = document.createElement("span");
            span.innerText = t.title;

            let btn = document.createElement("button");
            btn.innerText = "X";
            btn.onclick = () => deleteTask(t.id);

            li.appendChild(span);
            li.appendChild(btn);
            ul.appendChild(li);
        });
    })
    .catch(err => {
        alert(err.message);
    });
}
function deleteTask(id) {
    if (!confirm("Deseja deletar essa tarefa?")) return;

    fetch("http://127.0.0.1:5000/tasks/" + id, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(r => {
        if (!r.ok) {
            throw new Error("Erro ao deletar");
        }
        getTasks();
    })
    .catch(err => alert(err.message));
}

function logout() {
    localStorage.removeItem("token");
    token = "";
    alert("Deslogado");
    location.reload();
}

// roda quando abrir a página
if (token) {
    getTasks();
}
</script>
<button onclick="logout()">Sair</button>
</body>
</html>
