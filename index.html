<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tasks App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 5px;
}

.login-btn {
    background: #007bff;
    color: white;
    width: 100%;
}

.add-btn {
    background: #28a745;
    color: white;
    width: 100%;
}

.logout-btn {
    background: #dc3545;
    color: white;
    width: 100%;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #f1f1f1;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
}

li button {
    background: red;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="login-btn" onclick="login()">Login</button>
</div>

<h3 id="userName"></h3>

<!-- TAREFAS -->
<div id="appBox">
    <h2>Tarefas</h2>
    <input id="task" placeholder="Nova tarefa">
    <button class="add-btn" onclick="add()">Adicionar</button>
    <ul id="list"></ul>
    <button class="logout-btn" onclick="logout()">Sair</button>
</div>

</div>

<script>

const API = "https://api-tasks-2.onrender.com";
let token = localStorage.getItem("token") || "";

// MOSTRAR / ESCONDER LOGIN
function toggleLogin(show) {
    document.getElementById("loginBox").style.display = show ? "block" : "none";
    document.getElementById("appBox").style.display = show ? "none" : "block";
}

// LOGIN
function login() {
    fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(r => {
        if (!r.ok) throw new Error("Login inválido");
        return r.json();
    })
    .then(data => {
        token = data.access_token;
        localStorage.setItem("token", token);

        toggleLogin(false);
        getTasks();
    })
    .catch(err => alert(err.message));
}

// ADICIONAR
function add() {
    const title = document.getElementById("task").value;

    if (!title) {
        alert("Digite uma tarefa!");
        return;
    }

    fetch(API + "/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title })
    })
    .then(r => {
        if (!r.ok) throw new Error("Erro ao criar tarefa");
        return r.json();
    })
    .then(() => {
        document.getElementById("task").value = "";
        getTasks();
    })
    .catch(err => alert(err.message));
}

// LISTAR
function getTasks() {
    fetch(API + "/tasks", {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(async r => {
        if (r.status === 401) {
            alert("Sessão expirada");
            logout();
            return;
        }
        return r.json();
    })
    .then(data => {
        if (!data || !Array.isArray(data)) return;

        let ul = document.getElementById("list");
        ul.innerHTML = "";

        data.forEach(t => {
            let li = document.createElement("li");

            let span = document.createElement("span");
            span.innerText = t.title;

            let btn = document.createElement("button");
            btn.innerText = "X";
            btn.onclick = () => deleteTask(t.id);

            li.appendChild(span);
            li.appendChild(btn);
            ul.appendChild(li);
        });
    })
    .catch(() => alert("Erro ao carregar tarefas"));
}

// DELETAR
function deleteTask(id) {
    if (!confirm("Deseja deletar?")) return;

    fetch(API + "/tasks/" + id, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(r => {
        if (!r.ok) throw new Error("Erro ao deletar");
        getTasks();
    })
    .catch(err => alert(err.message));
}

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    token = "";
    toggleLogin(true);
    location.reload();
}

// AUTO LOGIN
if (token) {
    toggleLogin(false);
    getTasks();
} else {
    toggleLogin(true);
}

</script>

</body>
</html>
